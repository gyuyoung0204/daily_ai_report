name: Auto Issue Update

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'data/**'
      - 'skills/**'
      - '.github/workflows/**'

permissions:
  contents: read
  issues: write

jobs:
  update-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get commit details
        id: commit
        run: |
          # 멀티라인 값(커밋 메시지, 파일 목록)은 heredoc 구문 필수
          {
            echo "message<<COMMIT_EOF"
            git log -1 --pretty=%B
            echo "COMMIT_EOF"
            echo "files<<FILES_EOF"
            git diff-tree --no-commit-id --name-only -r HEAD
            echo "FILES_EOF"
          } >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "hash=$(git log -1 --pretty=%h)" >> $GITHUB_OUTPUT

      - name: Determine related issue
        id: issue
        run: |
          if echo "${{ steps.commit.outputs.files }}" | grep -q "scripts/collect_logs"; then
            echo "number=9" >> $GITHUB_OUTPUT
            echo "topic=log aggregation" >> $GITHUB_OUTPUT
          elif echo "${{ steps.commit.outputs.files }}" | grep -q "scripts/measure_performance"; then
            echo "number=10" >> $GITHUB_OUTPUT
            echo "topic=performance monitoring" >> $GITHUB_OUTPUT
          elif echo "${{ steps.commit.outputs.files }}" | grep -q "scripts/"; then
            echo "number=4" >> $GITHUB_OUTPUT
            echo "topic=automation scripts" >> $GITHUB_OUTPUT
          elif echo "${{ steps.commit.outputs.files }}" | grep -q "skills/"; then
            echo "number=5" >> $GITHUB_OUTPUT
            echo "topic=skill development" >> $GITHUB_OUTPUT
          else
            echo "number=0" >> $GITHUB_OUTPUT
          fi

      - name: Post comment to issue
        if: steps.issue.outputs.number != '0'
        uses: actions/github-script@v7
        env:
          COMMIT_MESSAGE: ${{ steps.commit.outputs.message }}
          CHANGED_FILES: ${{ steps.commit.outputs.files }}
        with:
          script: |
            const issueNumber = ${{ steps.issue.outputs.number }};
            const commitHash = '${{ steps.commit.outputs.hash }}';
            const author = '${{ steps.commit.outputs.author }}';
            const message = process.env.COMMIT_MESSAGE;
            const files = process.env.CHANGED_FILES;

            const comment = [
              '## 🔄 Code Update Detected',
              '',
              '**Commit:** `' + commitHash + '`',
              '**Author:** ' + author,
              '',
              '### Changes Made',
              '```',
              files,
              '```',
              '',
              '### Commit Message',
              message,
              '',
              '---',
              '**Action:** Issue progress may be affected by these changes.',
              '**Next Step:** Review changes and update issue status if needed.',
              '',
              '*Auto-generated by GitHub Actions*'
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });
