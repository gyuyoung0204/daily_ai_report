name: Auto Issue Update

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'data/**'
      - 'skills/**'

jobs:
  update-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get commit details
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "hash=$(git log -1 --pretty=%h)" >> $GITHUB_OUTPUT
          echo "files=$(git diff-tree --no-commit-id --name-only -r HEAD)" >> $GITHUB_OUTPUT

      - name: Determine related issue
        id: issue
        run: |
          if echo "${{ steps.commit.outputs.files }}" | grep -q "scripts/generate_digest.ps1"; then
            echo "number=1" >> $GITHUB_OUTPUT
            echo "topic=news collection" >> $GITHUB_OUTPUT
          elif echo "${{ steps.commit.outputs.files }}" | grep -q "scripts/"; then
            echo "number=1" >> $GITHUB_OUTPUT
            echo "topic=automation scripts" >> $GITHUB_OUTPUT
          elif echo "${{ steps.commit.outputs.files }}" | grep -q "skills/"; then
            echo "number=3" >> $GITHUB_OUTPUT
            echo "topic=skill development" >> $GITHUB_OUTPUT
          else
            echo "number=0" >> $GITHUB_OUTPUT
          fi

      - name: Post comment to issue
        if: steps.issue.outputs.number != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.issue.outputs.number }};
            const commitHash = '${{ steps.commit.outputs.hash }}';
            const author = '${{ steps.commit.outputs.author }}';
            const message = `${{ steps.commit.outputs.message }}`;
            const files = `${{ steps.commit.outputs.files }}`;

            const comment = `## 🔄 Code Update Detected

**Commit:** \`${commitHash}\`
**Author:** ${author}

### Changes Made
\`\`\`
${files}
\`\`\`

### Commit Message
${message}

---
**Action:** Issue progress may be affected by these changes.
**Next Step:** Review changes and update issue status if needed.

*Auto-generated by GitHub Actions*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });
